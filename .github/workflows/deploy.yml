name: Deploy Mizuki Blog to Pages
on:
  push:
    branches: [ main ] # 仅main分支推送触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 配置Node环境（适配Astro/Mizuki）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 安装依赖
      - name: Install dependencies
        run: npm ci

      # 打包生成public静态文件
      - name: Build blog
        run: npm run build

      # 部署到GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public # Mizuki/Astro打包输出目录