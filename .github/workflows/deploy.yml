name: Deploy Mizuki Blog to Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy: 
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 3. 配置 Node.js 22，缓存pnpm依赖
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # 4. 安装项目依赖（只执行一次）
      - name: Install dependencies
        run: pnpm install

      # 5. 打包博客，Astro输出dist文件夹
      - name: Build blog
        run: pnpm run build

      # 6. 部署到 GitHub Pages，publish_dir 改为 ./dist
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist